<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Pro Cloud Sync</title>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff;
            --accent: #0a84ff; --warning: #ffd60a; --success: #30d158;
            --navy: #002d72;
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 10px 10px 150px 10px; overscroll-behavior: none;
        }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; border-bottom: 1px solid #333; z-index: 100; }
        .progress-container { width: 100%; height: 12px; background: #333; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); transition: 0.5s; }
        h2 { margin: 0; font-size: 1.1rem; text-align: center; color: var(--accent); }
        #stats { text-align: center; font-size: 1rem; font-weight: bold; }
        .pallet-card {
            background: var(--card); border: 1px solid #333; border-radius: 12px;
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .loc { font-weight: bold; font-size: 1.2rem; color: var(--warning); }
        .lpn { font-family: monospace; font-size: 0.8rem; opacity: 0.6; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; display: flex; flex-direction: column; gap: 8px; }
        button { padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        #download-btn { background: var(--navy); color: white; display: none; }
        #reset-btn { background: #ff3b30; color: white; font-size: 0.7rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🔄 Sync Picker Pro</h2>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="stats">Pendientes: <span id="count">0</span></div>
    </div>

    <div id="pallet-list"></div>

    <div class="controls">
        <button id="download-btn" onclick="generateReport()">💾 GUARDAR REPORTE FINAL</button>
        <button id="reset-btn" onclick="resetSync()">⚠️ NUEVA LISTA (BORRAR TODO)</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        // LISTA MAESTRA
        const masterList = [
            { lpn: "LEC000000011JK", loc: "AN24F003" }, { lpn: "LEC000000011JU", loc: "AN26B003" },
            { lpn: "LEC000000011JS", loc: "AN26C001" }, { lpn: "LEC000000011JV", loc: "AN26F002" },
            { lpn: "LEC000000011JR", loc: "AQ25B002" }, { lpn: "LEC000000011JN", loc: "AQ25D001" },
            { lpn: "LEC000000011JT", loc: "AQ25F001" }, { lpn: "LEC000000011JM", loc: "AQ25F002" },
            { lpn: "LEC000000011JD", loc: "AR59A001" }, { lpn: "LEC000000011JA", loc: "AR59A002" },
            { lpn: "LEC000000011JQ", loc: "AR59A003" }, { lpn: "LEC000000011JE", loc: "AR61B002" },
            { lpn: "LEC000000011JP", loc: "AR61D003" }, { lpn: "LEC000000011JG", loc: "AR65B003" },
            { lpn: "LEC000000011JL", loc: "AR65C001" }, { lpn: "LEC000000011JC", loc: "AR65C002" },
            { lpn: "LEC000000011JW", loc: "AR65C003" }, { lpn: "LEC000000011JO", loc: "AR67D003" }
        ].sort((a, b) => a.loc.localeCompare(b.loc));

        const KEY = 'B_BURG_JOB';
        let state = JSON.parse(localStorage.getItem(KEY)) || { done: [] };

        function render() {
            const listDiv = document.getElementById('pallet-list');
            const pending = masterList.filter(m => !state.done.includes(m.lpn));
            
            listDiv.innerHTML = '';
            document.getElementById('count').innerText = pending.length;
            document.getElementById('progress-bar').style.width = ((masterList.length - pending.length) / masterList.length * 100) + '%';
            document.getElementById('download-btn').style.display = pending.length === 0 ? 'block' : 'none';

            pending.forEach(item => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                card.innerHTML = `<div><div class="loc">${item.loc}</div><div class="lpn">${item.lpn}</div></div><div>✅</div>`;
                card.onclick = () => {
                    state.done.push(item.lpn);
                    localStorage.setItem(KEY, JSON.stringify(state));
                    render();
                };
                listDiv.appendChild(card);
            });
        }

        // ESTA ES LA CLAVE: Escucha cambios de otros dispositivos (Reloj -> Celular)
        window.addEventListener('storage', (e) => {
            if (e.key === KEY) {
                state = JSON.parse(e.newValue);
                render();
            }
        });

        function resetSync() {
            if(confirm("¿Borrar progreso en ambos dispositivos?")) {
                localStorage.removeItem(KEY);
                location.reload();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            const finished = masterList.filter(m => state.done.includes(m.lpn));
            canvas.width = 500; canvas.height = 150 + (finished.length * 25);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,500,canvas.height);
            ctx.fillStyle = "#002d72"; ctx.font = "bold 20px Arial";
            ctx.fillText("INVENTORY WORK REPORT", 30, 40);
            ctx.fillStyle = "black"; ctx.font = "12px Courier";
            finished.forEach((p, i) => ctx.fillText(`${i+1}. LOC: ${p.loc} | LPN: ${p.lpn}`, 30, 80 + (i*25)));
            ctx.fillStyle = "#002d72"; ctx.fillRect(0, canvas.height-50, 500, 50);
            ctx.fillStyle = "white"; ctx.fillText("Finalizado: " + new Date().toLocaleString(), 30, canvas.height-20);
            const link = document.createElement('a');
            link.download = 'Reporte.png'; link.href = canvas.toDataURL(); link.click();
        }

        render();
    </script>
</body>
</html>
