<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Pro Sync - v5</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --accent: #0a84ff;
            --warning: #ffd60a;
            --success: #30d158;
            --progress-bg: #333;
            --navy: #002d72;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 10px 130px 10px;
            overscroll-behavior: none;
        }
        .header { 
            position: sticky; 
            top: 0; 
            background: var(--bg); 
            padding: 15px 0 10px 0;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--progress-bg);
            border-radius: 6px;
            margin: 10px 0;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        h2 { margin: 0; font-size: 1.1rem; text-align: center; color: var(--accent); }
        #stats { text-align: center; font-size: 1rem; margin-top: 5px; font-weight: bold; }
        #last-action-box {
            background: #1a1a1a;
            border-left: 4px solid var(--success);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .list-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .pallet-card {
            background-color: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loc { font-weight: bold; font-size: 1.3rem; color: var(--warning); }
        .lpn { font-family: monospace; font-size: 0.85rem; opacity: 0.6; margin-top: 4px; }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        button {
            padding: 16px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        #undo-btn { background: #333; color: white; display: none; }
        #download-btn { background: var(--navy); color: white; display: none; }
        #reset-btn { 
            background: #ff3b30; 
            color: white; 
            font-size: 0.7rem; 
            padding: 8px; 
            border-radius: 20px; 
            margin-top: 5px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📦 Sync Picker</h2>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="stats">Pending: <span id="count">0</span></div>
        <div id="last-action-box">Last: <span id="last-text" style="color:var(--success); font-weight:bold;">None</span></div>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="controls">
        <button id="undo-btn" onclick="undoDelete()">↩ Undo last</button>
        <button id="download-btn" onclick="generateReport()">💾 Save Final Report</button>
        <button id="reset-btn" onclick="resetAll()">⚠️ Reset Progress (New Job)</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        const STORAGE_KEY = 'kn_pallets_work';
        const WORKED_KEY = 'kn_pallets_done';

        // LISTA DE LA ÚLTIMA IMAGEN
        const masterList = [
            { lpn: "LEC000000011JK", loc: "AN24F003" }, { lpn: "LEC000000011JU", loc: "AN26B003" },
            { lpn: "LEC000000011JS", loc: "AN26C001" }, { lpn: "LEC000000011JV", loc: "AN26F002" },
            { lpn: "LEC000000011JR", loc: "AQ25B002" }, { lpn: "LEC000000011JN", loc: "AQ25D001" },
            { lpn: "LEC000000011JT", loc: "AQ25F001" }, { lpn: "LEC000000011JM", loc: "AQ25F002" },
            { lpn: "LEC000000011JD", loc: "AR59A001" }, { lpn: "LEC000000011JA", loc: "AR59A002" },
            { lpn: "LEC000000011JQ", loc: "AR59A003" }, { lpn: "LEC000000011JE", loc: "AR61B002" },
            { lpn: "LEC000000011JP", loc: "AR61D003" }, { lpn: "LEC000000011JG", loc: "AR65B003" },
            { lpn: "LEC000000011JL", loc: "AR65C001" }, { lpn: "LEC000000011JC", loc: "AR65C002" },
            { lpn: "LEC000000011JW", loc: "AR65C003" }, { lpn: "LEC000000011JO", loc: "AR67D003" }
        ].sort((a, b) => a.loc.localeCompare(b.loc));

        let pallets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [...masterList];
        let workedPallets = JSON.parse(localStorage.getItem(WORKED_KEY)) || [];
        let lastDeleted = null;

        const listDiv = document.getElementById('pallet-list');
        const countSpan = document.getElementById('count');
        const lastText = document.getElementById('last-text');
        const undoBtn = document.getElementById('undo-btn');
        const downloadBtn = document.getElementById('download-btn');
        const progressBar = document.getElementById('progress-bar');

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(pallets));
            localStorage.setItem(WORKED_KEY, JSON.stringify(workedPallets));
        }

        function render() {
            listDiv.innerHTML = '';
            countSpan.innerText = pallets.length;
            const total = pallets.length + workedPallets.length;
            const percent = ((workedPallets.length / total) * 100) || 0;
            progressBar.style.width = percent + '%';
            
            downloadBtn.style.display = (pallets.length === 0 && workedPallets.length > 0) ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                card.innerHTML = `<div><span class="loc">${item.loc}</span><br><span class="lpn">${item.lpn}</span></div><div style="color:var(--accent); font-weight:bold;">✓</div>`;
                card.onclick = () => {
                    lastDeleted = { data: pallets[index], index: index };
                    lastText.innerText = pallets[index].loc;
                    workedPallets.push(pallets[index]);
                    pallets.splice(index, 1);
                    saveData();
                    render();
                    undoBtn.style.display = 'block';
                    setTimeout(() => undoBtn.style.display = 'none', 8000);
                };
                listDiv.appendChild(card);
            });
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                workedPallets.pop();
                lastDeleted = null;
                saveData();
                render();
                undoBtn.style.display = 'none';
            }
        }

        function resetAll() {
            if(confirm("⚠️ ¿Iniciar nuevo trabajo? Se borrará el progreso guardado.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            const endTimeStr = new Date().toLocaleString();
            canvas.width = 500;
