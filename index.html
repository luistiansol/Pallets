<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Helper - Watch optimized</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --accent: #0a84ff;
            --warning: #ffd60a;
            --success: #30d158;
            --undo: #ff453a;
            --navy: #002d72;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0; /* Quitamos padding general para ganar espacio */
            overscroll-behavior: none;
        }
        
        /* CABECERA COMPACTA Y FLOTANTE */
        .header { 
            position: sticky; 
            top: 0; 
            background: rgba(0, 0, 0, 0.85); /* Semitransparente para ver fondo */
            backdrop-filter: blur(5px);
            padding: 5px 8px; /* Padding mínimo */
            border-bottom: 1px solid #222;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Contenedor compacto para Pending y Last unidos */
        .info-bar {
            display: flex;
            gap: 10px;
            font-size: 0.7rem; /* Fuente pequeña para no estorbar */
            opacity: 0.8;
        }
        #stats { font-weight: bold; color: var(--accent); }
        #last-text { color: var(--success); }

        #undo-btn { 
            color: var(--undo); 
            background: none; 
            border: none; 
            font-size: 0.7rem; /* Misma fuente pequeña */
            font-weight: bold; 
            padding: 0;
            display: none;
            cursor: pointer;
        }

        /* DISEÑO DE TARJETA: LOCATION ENORME */
        .list-container { 
            display: flex; 
            flex-direction: column; 
            gap: 2px; /* Espacio mínimo entre tarjetas */
            padding: 2px 5px; 
        }
        
        .pallet-card {
            background-color: var(--card);
            border-radius: 8px;
            padding: 8px 12px; /* Padding compacto */
            display: flex;
            flex-direction: column; /* Diseño en columna */
            justify-content: center;
            align-items: center;
            border: 1px solid #222;
            height: 70px; /* Altura fija para el reloj */
        }
        
        .pallet-card:active { background-color: #2c2c2e; transform: scale(0.98); }
        
        /* LOCATION: EL ELEMENTO PRINCIPAL */
        .loc { 
            font-weight: bold; 
            font-size: 1.8rem; /* ¡Fuente muy grande! */
            color: var(--warning);
            margin: 0;
            line-height: 1;
            width: 100%;
            text-align: center;
        }
        
        .lpn { 
            font-family: monospace; 
            font-size: 0.65rem; /* Fuente pequeña para LPN */
            opacity: 0.5; 
            margin-top: 2px;
            text-align: center;
        }
        
        /* Controles finales compactos */
        .controls {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 100;
        }
        #download-btn {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: var(--navy);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        /* Ajuste específico para pantallas muy pequeñas (Reloj) */
        @media (max-width: 300px) {
            .loc { font-size: 1.5rem; }
            .pallet-card { height: 60px; }
            .info-bar, #undo-btn { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="info-bar">
            <span id="stats">P:<span id="count">0</span></span>
            <span>L:<span id="last-text">None</span></span>
        </div>
        <button id="undo-btn" onclick="undoDelete()">UNDO</button>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="controls">
        <button id="download-btn" onclick="generateReport()">💾 SAVE FINAL REPORT</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        // DATOS EXTRAÍDOS DE LA ÚLTIMA IMAGEN (A-Z)
        let pallets = [
            { lpn: "LEC0000000113C", loc: "AQ11D002" }, { lpn: "LEC0000000113G", loc: "AQ11D003" },
            { lpn: "LEC0000000113E", loc: "AQ11C002" }, { lpn: "LEC00000001131", loc: "AN16D001" },
            { lpn: "LEC0000000112Y", loc: "AQ15C003" }, { lpn: "LEC0000000113V", loc: "AQ11F002" },
            { lpn: "LEC0000000113H", loc: "AQ13F001" }, { lpn: "LEC0000000113J", loc: "AQ13F003" },
            { lpn: "LEC00000001134", loc: "AQ15B002" }, { lpn: "LEC0000000113K", loc: "AQ13F002" },
            { lpn: "LEC0000000113P", loc: "AQ11F001" }, { lpn: "LEC00000001137", loc: "AO37A003" },
            { lpn: "LEC0000000113X", loc: "AQ11A003" }, { lpn: "LEC00000001139", loc: "AQ13D001" },
            { lpn: "LEC0000000112S", loc: "AO37B003" }, { lpn: "LEC0000000113I", loc: "AQ13C001" },
            { lpn: "LEC0000000112Q", loc: "AO37B001" }, { lpn: "LEC0000000112O", loc: "AO37B002" },
            { lpn: "LEC0000000113Z", loc: "AP29D001" }, { lpn: "LEC0000000113L", loc: "AQ13B003" },
            { lpn: "LEC0000000112V", loc: "AN14F003" }, { lpn: "LEC0000000112L", loc: "AN16C001" },
            { lpn: "LEC0000000113M", loc: "AN12F003" }, { lpn: "LEC0000000113N", loc: "AN14F002" },
            { lpn: "LEC0000000113O", loc: "AN14F001" }, { lpn: "LEC0000000113F", loc: "AN12F002" }
        ].sort((a, b) => a.loc.localeCompare(b.loc)); // Ordenar A-Z

        const totalInitial = pallets.length;
        let workedPallets = []; 
        let lastDeleted = null;

        const listDiv = document.getElementById('pallet-list');
        const countSpan = document.getElementById('count');
        const lastText = document.getElementById('last-text');
        const undoBtn = document.getElementById('undo-btn');
        const downloadBtn = document.getElementById('download-btn');

        function render() {
            listDiv.innerHTML = '';
            countSpan.innerText = pallets.length;
            
            // Botón corporativo Navy Blue aparece solo al terminar
            downloadBtn.style.display = (pallets.length === 0 && workedPallets.length > 0) ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                // El diseño pone la LOCATION primero y ENORME, el LPN pequeño debajo.
                card.innerHTML = `
                    <span class="loc">${item.loc}</span>
                    <span class="lpn">${item.lpn}</span>
                `;
                card.onclick = () => removePallet(index);
                listDiv.appendChild(card);
            });
        }

        function removePallet(index) {
            const item = pallets[index];
            lastDeleted = { data: item, index: index };
            lastText.innerText = item.loc.substring(0, 3); // Solo primeros 3 chars para no ocupar espacio
            workedPallets.push({ ...item, time: new Date().toLocaleTimeString() });
            pallets.splice(index, 1);
            undoBtn.style.display = 'block';
            render();
            // Deshacer desaparece rápido en el reloj
            setTimeout(() => { undoBtn.style.display = 'none'; }, 6000);
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                workedPallets.pop();
                lastDeleted = null;
                undoBtn.style.display = 'none';
                lastText.innerText = workedPallets.length > 0 ? workedPallets[workedPallets.length-1].loc.substring(0, 3) : "None";
                render();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            const dateStr = new Date().toLocaleString();
            canvas.width = 500; canvas.height = 130 + (workedPallets.length * 30);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,500,canvas.height);
            ctx.fillStyle = "#002d72"; ctx.font = "bold 20px Arial"; ctx.fillText("INVENTORY WORK REPORT", 30, 50);
            ctx.fillStyle = "black"; ctx.font = "14px Courier New";
            workedPallets.forEach((p, i) => ctx.fillText(`${(i+1).toString().padStart(2,'0')}. LOC: ${p.loc.padEnd(10)} | LPN: ${p.lpn}`, 30, 100 + (i * 28)));
            ctx.fillStyle = "#002d72"; ctx.fillRect(0, canvas.height-60, 500, 60);
            ctx.fillStyle = "white"; ctx.font = "italic 14px Arial"; ctx.fillText(`Completed: ${dateStr}`, 30, canvas.height-25);
            const link = document.createElement('a'); link.download = 'KN_Work_Report.png'; link.href = canvas.toDataURL(); link.click();
        }

        render();
    </script>
</body>
</html>
