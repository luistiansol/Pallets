<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Pro PWA</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#002d72">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Picker Pro","short_name":"Picker","start_url":".","display":"standalone","background_color":"#000","theme_color":"#002d72","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2312/2312701.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #0a84ff;
            --warning: #ffd60a; --success: #30d158; --undo: #ff453a;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overscroll-behavior: none; }
        
        /* Cabecera Agrupada (v12) */
        .header { position: sticky; top: 0; background: #111; padding: 12px; border-bottom: 1px solid #333; z-index: 100; }
        .row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #undo-btn { background: var(--undo); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; display: none; cursor: pointer; }
        .row-2 { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: 0.4s; }
        
        /* Lista de Pallets */
        .list-container { padding: 10px 5px; display: flex; flex-direction: column; gap: 8px; }
        .pallet-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; }
        .loc { font-weight: bold; font-size: 1.8rem; color: var(--warning); margin: 0; }
        .lpn { font-size: 0.8rem; opacity: 0.6; margin-top: 5px; font-family: monospace; }
        
        /* Botón Reporte Navy */
        .footer-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 200; }
        #download-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #002d72; color: white; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row-1">
            <span>Pending: <span id="count" style="color:var(--accent)">0</span></span>
            <button id="undo-btn" onclick="undoDelete()">UNDO</button>
        </div>
        <div class="row-2">Last: <span id="last-text" style="color:var(--success)">None</span></div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="footer-btn">
        <button id="download-btn" onclick="generateReport()">💾 SAVE FINAL REPORT</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        // --- REGISTRO DE SERVICE WORKER (PWA) ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE = 'picker-v14';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.add('./'))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // --- DATOS DEL TRABAJO ---
        const masterList = [
            { lpn: "LEC000000011JK", loc: "AN24F003" }, { lpn: "LEC000000011JU", loc: "AN26B003" },
            { lpn: "LEC000000011JS", loc: "AN26C001" }, { lpn: "LEC000000011JV", loc: "AN26F002" },
            { lpn: "LEC000000011JR", loc: "AQ25B002" }, { lpn: "LEC000000011JN", loc: "AQ25D001" },
            { lpn: "LEC000000011JT", loc: "AQ25F001" }, { lpn: "LEC000000011JM", loc: "AQ25F002" },
            { lpn: "LEC000000011JD", loc: "AR59A001" }, { lpn: "LEC000000011JA", loc: "AR59A002" },
            { lpn: "LEC000000011JQ", loc: "AR59A003" }, { lpn: "LEC000000011JE", loc: "AR61B002" },
            { lpn: "LEC000000011JP", loc: "AR61D003" }, { lpn: "LEC000000011JG", loc: "AR65B003" },
            { lpn: "LEC000000011JL", loc: "AR65C001" }, { lpn: "LEC000000011JC", loc: "AR65C002" },
            { lpn: "LEC000000011JW", loc: "AR65C003" }, { lpn: "LEC000000011JO", loc: "AR67D003" }
        ].sort((a, b) => a.loc.localeCompare(b.loc));

        let pallets = [...masterList];
        const totalInit = pallets.length;
        let worked = []; let lastDeleted = null;

        function render() {
            const listDiv = document.getElementById('pallet-list');
            listDiv.innerHTML = '';
            document.getElementById('count').innerText = pallets.length;
            document.getElementById('progress-bar').style.width = ((worked.length / totalInit) * 100) + '%';
            document.getElementById('download-btn').style.display = pallets.length === 0 ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                card.innerHTML = `<div class="loc">${item.loc}</div><div class="lpn">${item.lpn}</div>`;
                card.onclick = () => {
                    lastDeleted = { data: pallets[index], index: index };
                    document.getElementById('last-text').innerText = item.loc;
                    worked.push(item); pallets.splice(index, 1);
                    document.getElementById('undo-btn').style.display = 'block';
                    render();
                };
                listDiv.appendChild(card);
            });
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                worked.pop(); lastDeleted = null;
                document.getElementById('undo-btn').style.display = 'none';
                document.getElementById('last-text').innerText = worked.length > 0 ? worked[worked.length-1].loc : "None";
                render();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas'); const ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 150 + (worked.length * 28);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,500,canvas.height);
            ctx.fillStyle = "#002d72"; ctx.font = "bold 20px Arial"; ctx.fillText("INVENTORY WORK REPORT", 30, 40);
            ctx.fillStyle = "black"; ctx.font = "14px Courier";
            worked.forEach((p, i) => ctx.fillText(`${i+1}. LOC: ${p.loc} | LPN: ${p.lpn}`, 30, 80 + (i*28)));
            ctx.fillStyle = "#002d72"; ctx.fillRect(0, canvas.height-50, 500, 50);
            ctx.fillStyle = "white"; ctx.fillText("Completed: " + new Date().toLocaleString(), 30, canvas.height-20);
            const link = document.createElement('a'); link.download = 'Report.png'; link.href = canvas.toDataURL(); link.click();
        }
        render();
    </script>
</body>
</html>
