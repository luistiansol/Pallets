<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Helper v10</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --accent: #0a84ff;
            --warning: #ffd60a;
            --success: #30d158;
            --undo: #ff453a;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 0 80px 0;
            overscroll-behavior: none;
        }
        
        /* BARRA DE PROGRESO (ARRIBA DEL TODO) */
        .progress-line {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--success);
            width: 0%;
            z-index: 1000;
            transition: width 0.4s ease;
        }

        /* CABECERA: TAMAÑO MEDIO PARA RELOJ */
        .header { 
            position: sticky; 
            top: 4px; 
            background: #111;
            padding: 10px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .info-group span { font-size: 0.9rem; font-weight: bold; }
        #count { color: var(--accent); }
        #last-text { color: var(--success); }

        /* BOTÓN UNDO: AHORA SÍ SE VE */
        #undo-btn { 
            background-color: var(--undo);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.8rem;
            display: none;
            cursor: pointer;
        }

        /* LISTA: PRIORIDAD A LA UBICACIÓN */
        .list-container { 
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .pallet-card {
            background-color: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .pallet-card:active { background-color: #333; }
        
        .loc { 
            font-weight: bold; 
            font-size: 1.8rem; /* Bien grande para ver desde lejos */
            color: var(--warning);
            margin: 0;
        }
        
        .lpn { 
            font-size: 0.8rem;
            opacity: 0.6;
            margin-top: 5px;
            font-family: monospace;
        }
        
        /* BOTÓN REPORTE */
        .footer-btn {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 200;
        }
        #download-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: #002d72;
            color: white;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div id="progress-line" class="progress-line"></div>

    <div class="header">
        <div class="info-group">
            <span>Pending: <span id="count">0</span></span>
            <span>Last: <span id="last-text">None</span></span>
        </div>
        <button id="undo-btn" onclick="undoDelete()">UNDO</button>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="footer-btn">
        <button id="download-btn" onclick="generateReport()">💾 SAVE REPORT</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        // DATOS (A-Z)
        let pallets = [
            { lpn: "LEC0000000113C", loc: "AQ11D002" }, { lpn: "LEC0000000113G", loc: "AQ11D003" },
            { lpn: "LEC0000000113E", loc: "AQ11C002" }, { lpn: "LEC00000001131", loc: "AN16D001" },
            { lpn: "LEC0000000112Y", loc: "AQ15C003" }, { lpn: "LEC0000000113V", loc: "AQ11F002" },
            { lpn: "LEC0000000113H", loc: "AQ13F001" }, { lpn: "LEC0000000113J", loc: "AQ13F003" },
            { lpn: "LEC00000001134", loc: "AQ15B002" }, { lpn: "LEC0000000113K", loc: "AQ13F002" },
            { lpn: "LEC0000000113P", loc: "AQ11F001" }, { lpn: "LEC00000001137", loc: "AO37A003" },
            { lpn: "LEC0000000113X", loc: "AQ11A003" }, { lpn: "LEC00000001139", loc: "AQ13D001" },
            { lpn: "LEC0000000112S", loc: "AO37B003" }, { lpn: "LEC0000000113I", loc: "AQ13C001" },
            { lpn: "LEC0000000112Q", loc: "AO37B001" }, { lpn: "LEC0000000112O", loc: "AO37B002" },
            { lpn: "LEC0000000113Z", loc: "AP29D001" }, { lpn: "LEC0000000113L", loc: "AQ13B003" },
            { lpn: "LEC0000000112V", loc: "AN14F003" }, { lpn: "LEC0000000112L", loc: "AN16C001" },
            { lpn: "LEC0000000113M", loc: "AN12F003" }, { lpn: "LEC0000000113N", loc: "AN14F002" },
            { lpn: "LEC0000000113O", loc: "AN14F001" }, { lpn: "LEC0000000113F", loc: "AN12F002" }
        ].sort((a, b) => a.loc.localeCompare(b.loc));

        const totalInitial = pallets.length;
        let workedPallets = []; 
        let lastDeleted = null;

        const listDiv = document.getElementById('pallet-list');
        const countSpan = document.getElementById('count');
        const lastText = document.getElementById('last-text');
        const undoBtn = document.getElementById('undo-btn');
        const downloadBtn = document.getElementById('download-btn');
        const progressLine = document.getElementById('progress-line');

        function render() {
            listDiv.innerHTML = '';
            countSpan.innerText = pallets.length;
            progressLine.style.width = ((workedPallets.length / totalInitial) * 100) + '%';
            downloadBtn.style.display = (pallets.length === 0) ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                card.innerHTML = `<span class="loc">${item.loc}</span><span class="lpn">${item.lpn}</span>`;
                card.onclick = () => {
                    lastDeleted = { data: pallets[index], index: index };
                    lastText.innerText = item.loc;
                    workedPallets.push(item);
                    pallets.splice(index, 1);
                    undoBtn.style.display = 'block';
                    render();
                };
                listDiv.appendChild(card);
            });
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                workedPallets.pop();
                lastDeleted = null;
                undoBtn.style.display = 'none';
                lastText.innerText = workedPallets.length > 0 ? workedPallets[workedPallets.length-1].loc : "None";
                render();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 150 + (workedPallets.length * 30);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,500,canvas.height);
            ctx.fillStyle = "#002d72"; ctx.font = "bold 20px Arial"; ctx.fillText("INVENTORY WORK REPORT", 30, 40);
            ctx.fillStyle = "black"; ctx.font = "14px Courier";
            workedPallets.forEach((p, i) => ctx.fillText(`${i+1}. LOC: ${p.loc} | LPN: ${p.lpn}`, 30, 80 + (i*28)));
            ctx.fillStyle = "#002d72"; ctx.fillRect(0, canvas.height-60, 500, 60);
            ctx.fillStyle = "white"; ctx.fillText("Completed: " + new Date().toLocaleString(), 30, canvas.height-25);
            const link = document.createElement('a'); link.download = 'Report.png'; link.href = canvas.toDataURL(); link.click();
        }

        render();
    </script>
</body>
</html>
