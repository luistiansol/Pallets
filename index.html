<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picker Pro - Inventory Helper</title>
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --text: #ffffff;
            --accent: #0a84ff;
            --warning: #ffd60a;
            --success: #30d158;
            --progress-bg: #333;
            --navy: #002d72;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 10px 110px 10px;
            overscroll-behavior: none;
        }
        .header { 
            position: sticky; 
            top: 0; 
            background: var(--bg); 
            padding: 15px 0 10px 0;
            border-bottom: 1px solid #333;
            z-index: 100;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--progress-bg);
            border-radius: 6px;
            margin: 10px 0;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        h2 { margin: 0; font-size: 1.1rem; text-align: center; color: var(--accent); }
        #stats { text-align: center; font-size: 1rem; margin-top: 5px; font-weight: bold; }
        #last-action-box {
            background: #1a1a1a;
            border-left: 4px solid var(--success);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .list-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .pallet-card {
            background-color: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pallet-card:active { background-color: #2c2c2e; transform: scale(0.97); }
        .loc { font-weight: bold; font-size: 1.3rem; color: var(--warning); }
        .lpn { font-family: monospace; font-size: 0.85rem; opacity: 0.6; margin-top: 4px; }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        button {
            padding: 16px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        #undo-btn { background: #333; color: white; display: none; }
        #download-btn { background: var(--navy); color: white; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📦 Picker Progress</h2>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="stats">Pending: <span id="count">0</span></div>
        <div id="last-action-box">
            Last: <span id="last-text" style="color:var(--success); font-weight:bold;">None</span>
        </div>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="controls">
        <button id="undo-btn" onclick="undoDelete()">↩ Undo last pick</button>
        <button id="download-btn" onclick="generateReport()">💾 Save Final Report</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        // --- DATA ACTUALIZADA DESDE IMAGEN ---
        let pallets = [
            { lpn: "LEC000000011JK", loc: "AN24F003" },
            { lpn: "LEC000000011JU", loc: "AN26B003" },
            { lpn: "LEC000000011JS", loc: "AN26C001" },
            { lpn: "LEC000000011JV", loc: "AN26F002" },
            { lpn: "LEC000000011JR", loc: "AQ25B002" },
            { lpn: "LEC000000011JN", loc: "AQ25D001" },
            { lpn: "LEC000000011JT", loc: "AQ25F001" },
            { lpn: "LEC000000011JM", loc: "AQ25F002" },
            { lpn: "LEC000000011JD", loc: "AR59A001" },
            { lpn: "LEC000000011JA", loc: "AR59A002" },
            { lpn: "LEC000000011JQ", loc: "AR59A003" },
            { lpn: "LEC000000011JE", loc: "AR61B002" },
            { lpn: "LEC000000011JP", loc: "AR61D003" },
            { lpn: "LEC000000011JG", loc: "AR65B003" },
            { lpn: "LEC000000011JL", loc: "AR65C001" },
            { lpn: "LEC000000011JC", loc: "AR65C002" },
            { lpn: "LEC000000011JW", loc: "AR65C003" },
            { lpn: "LEC000000011JO", loc: "AR67D003" }
        ];

        pallets.sort((a, b) => a.loc.localeCompare(b.loc));
        const totalInitial = pallets.length;
        let workedPallets = []; 
        let lastDeleted = null;

        const listDiv = document.getElementById('pallet-list');
        const countSpan = document.getElementById('count');
        const lastText = document.getElementById('last-text');
        const undoBtn = document.getElementById('undo-btn');
        const downloadBtn = document.getElementById('download-btn');
        const progressBar = document.getElementById('progress-bar');

        function updateProgress() {
            const percent = ((workedPallets.length / totalInitial) * 100);
            progressBar.style.width = percent + '%';
        }

        function render() {
            listDiv.innerHTML = '';
            countSpan.innerText = pallets.length;
            updateProgress();
            downloadBtn.style.display = (pallets.length === 0 && workedPallets.length > 0) ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                card.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <span class="loc">${item.loc}</span>
                        <span class="lpn">${item.lpn}</span>
                    </div>
                    <div style="color:var(--accent); font-weight:bold;">✓</div>
                `;
                card.onclick = () => removePallet(index);
                listDiv.appendChild(card);
            });
        }

        function removePallet(index) {
            const item = pallets[index];
            lastDeleted = { data: item, index: index };
            lastText.innerText = `${item.loc}`;
            workedPallets.push(item);
            pallets.splice(index, 1);
            undoBtn.style.display = 'block';
            render();
            setTimeout(() => { undoBtn.style.display = 'none'; }, 8000);
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                workedPallets.pop();
                lastDeleted = null;
                undoBtn.style.display = 'none';
                render();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            const endTimeStr = new Date().toLocaleString();
            canvas.width = 500;
            const listHeight = workedPallets.length * 28;
            canvas.height = 100 + listHeight + 60; 
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#002d72";
            ctx.font = "bold 20px Arial";
            ctx.fillText("INVENTORY WORK REPORT", 30, 50);
            ctx.strokeStyle = "#002d72";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(30, 65);
            ctx.lineTo(470, 65);
            ctx.stroke();
            ctx.fillStyle = "black";
            ctx.font = "14px Courier New";
            workedPallets.forEach((p, i) => {
                ctx.fillText(`${(i+1).toString().padStart(2,'0')}. LOC: ${p.loc.padEnd(10)} | LPN: ${p.lpn}`, 30, 100 + (i * 28));
            });
            const footerY = canvas.height - 60;
            ctx.fillStyle = "#002d72";
            ctx.fillRect(0, footerY, canvas.width, 60);
            ctx.fillStyle = "white";
            ctx.font = "italic 14px Arial";
            ctx.fillText(`Completion Date & Time: ${endTimeStr}`, 30, footerY + 35);
            const link = document.createElement('a');
            link.download = `Work_Report_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        render();
    </script>
</body>
</html>
